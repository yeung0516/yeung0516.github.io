name: Update Airport Bus Map Data

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:

concurrency:
  group: update-airport-map-data
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  fetch-airport-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch airport bus and traffic data
        run: python scripts/fetch_airport_bus_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/airport_bus_routes.json data/airport_traffic_speeds.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update airport bus map data $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git pull --rebase
            git push
          fi
