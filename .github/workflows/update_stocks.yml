name: Update Stock Data

on:
  schedule:
    # Run every 20 minutes for progressive updates (3 symbols per run)
    - cron: '*/20 * * * *'
  workflow_dispatch:

concurrency:
  group: update-stock-data
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch stock data (progressive update)
        env:
          STOCK_BATCH_SIZE: "3"
        run: python scripts/fetch_stock_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update stock data $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git pull --rebase
            git push
          fi
