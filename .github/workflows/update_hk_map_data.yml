name: Update HK Map Data

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:

concurrency:
  group: update-hk-map-data
  cancel-in-progress: true   # cancel any queued run; only the latest matters

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch HK map data
        run: python scripts/fetch_hk_map_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hk_bus_routes.json data/hk_traffic_speeds.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update HK map data $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
