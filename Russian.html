<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Russian Learning | Учим Русский Язык</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇷🇺</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ========== RESET & VARIABLES ========== */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f4ff;
  --card-bg:#ffffff;
  --ru-accent:#c62828;
  --ru-blue:#1565c0;
  --ru-white:#fafafa;
  --key1:#e91e63;
  --key2:#9c27b0;
  --key3:#2196f3;
  --key4:#00897b;
  --key5:#ff6f00;
  --key6:#6a1b9a;
  --shadow:0 4px 24px rgba(0,0,0,0.08);
  --shadow-hover:0 8px 32px rgba(0,0,0,0.14);
  --radius:16px;
  --max-w:900px;
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:'Noto Sans','Noto Sans TC','Noto Sans SC',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:#333;
  line-height:1.7;
  min-height:100vh;
  overflow-x:hidden;
}

/* ========== HERO ========== */
.hero{
  background:linear-gradient(135deg,#1565c0 0%,#c62828 50%,#fafafa 100%);
  padding:60px 20px 50px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(circle at 20% 50%,rgba(255,255,255,0.15) 0%,transparent 50%),
    radial-gradient(circle at 80% 30%,rgba(255,255,255,0.1) 0%,transparent 40%);
}
.hero h1{
  font-size:clamp(28px,6vw,48px);
  font-weight:900;
  color:#fff;
  text-shadow:0 2px 12px rgba(0,0,0,0.3);
  position:relative;
  letter-spacing:1px;
}
.hero .subtitle{
  font-size:clamp(13px,3vw,18px);
  color:rgba(255,255,255,0.92);
  margin-top:8px;
  position:relative;
  font-weight:400;
}
.hero .flag-row{
  margin-top:18px;
  font-size:clamp(28px,5vw,42px);
  position:relative;
}

/* ========== LANGUAGE SWITCHER ========== */
.lang-bar{
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
  padding:16px 20px;
  background:#fff;
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,0.06);
}
.lang-btn{
  padding:8px 18px;
  border:2px solid #ddd;
  border-radius:24px;
  background:#fff;
  cursor:pointer;
  font-size:14px;
  font-weight:600;
  transition:all .25s ease;
  white-space:nowrap;
  font-family:inherit;
}
.lang-btn:hover{border-color:var(--ru-blue);color:var(--ru-blue)}
.lang-btn.active{
  background:var(--ru-blue);
  color:#fff;
  border-color:var(--ru-blue);
}

/* ========== MAIN CONTAINER ========== */
.container{
  max-width:var(--max-w);
  margin:0 auto;
  padding:24px 16px 60px;
}

/* ========== SCENARIO CARDS ========== */
.scenario-card{
  background:var(--card-bg);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  margin-bottom:28px;
  overflow:hidden;
  transition:box-shadow .3s ease,transform .2s ease;
}
.scenario-card:hover{
  box-shadow:var(--shadow-hover);
  transform:translateY(-2px);
}
.card-header{
  padding:20px 24px 16px;
  display:flex;
  align-items:center;
  gap:14px;
  border-bottom:1px solid rgba(0,0,0,0.06);
}
.card-num{
  width:44px;height:44px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:18px;
  flex-shrink:0;
}
.card-header h2{
  font-size:clamp(16px,3.5vw,20px);
  font-weight:700;
  color:#333;
}
.card-header .scene-icon{font-size:24px;flex-shrink:0}

.card-body{padding:20px 24px 24px}

/* ========== RUSSIAN TEXT ========== */
.ru-text{
  font-size:clamp(17px,3.5vw,22px);
  line-height:1.8;
  color:#1a1a1a;
  margin-bottom:16px;
  padding:18px 20px;
  background:linear-gradient(135deg,#fce4ec 0%,#e3f2fd 100%);
  border-radius:12px;
  border-left:5px solid var(--ru-accent);
  position:relative;
}
.ru-text .kw{
  font-weight:700;
  padding:1px 5px;
  border-radius:4px;
  white-space:nowrap;
}
.kw1{background:rgba(233,30,99,0.15);color:#c2185b}
.kw2{background:rgba(156,39,176,0.15);color:#7b1fa2}
.kw3{background:rgba(33,150,243,0.15);color:#1565c0}
.kw4{background:rgba(0,137,123,0.15);color:#00695c}
.kw5{background:rgba(255,111,0,0.15);color:#e65100}
.kw6{background:rgba(106,27,154,0.15);color:#4a148c}

/* ========== SPEAK BUTTON ========== */
.speak-btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:8px 16px;
  background:linear-gradient(135deg,var(--ru-accent),#d32f2f);
  color:#fff;
  border:none;
  border-radius:24px;
  cursor:pointer;
  font-size:14px;
  font-weight:600;
  transition:all .25s ease;
  margin-bottom:16px;
  font-family:inherit;
}
.speak-btn:hover{
  background:linear-gradient(135deg,#b71c1c,#c62828);
  transform:scale(1.05);
}
.speak-btn:active{transform:scale(0.97)}
.speak-btn.playing{
  animation:pulse-glow 1.2s infinite;
}
@keyframes pulse-glow{
  0%,100%{box-shadow:0 0 0 0 rgba(198,40,40,0.4)}
  50%{box-shadow:0 0 0 10px rgba(198,40,40,0)}
}
.speak-icon{font-size:18px}

/* ========== TRANSLATION BLOCK ========== */
.translation{
  margin-top:12px;
  padding:14px 18px;
  border-radius:10px;
  font-size:clamp(14px,3vw,16px);
  line-height:1.7;
}
.trans-en{background:#e8f5e9;border-left:4px solid #43a047;color:#2e7d32}
.trans-hk{background:#fff3e0;border-left:4px solid #fb8c00;color:#e65100}
.trans-tw{background:#fce4ec;border-left:4px solid #ec407a;color:#c2185b}
.trans-cn{background:#e3f2fd;border-left:4px solid #42a5f5;color:#1565c0}
.trans-label{
  display:inline-block;
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:1px;
  padding:2px 8px;
  border-radius:4px;
  margin-bottom:6px;
}
.trans-en .trans-label{background:#43a047;color:#fff}
.trans-hk .trans-label{background:#fb8c00;color:#fff}
.trans-tw .trans-label{background:#ec407a;color:#fff}
.trans-cn .trans-label{background:#42a5f5;color:#fff}

/* ========== PRONUNCIATION GUIDE ========== */
.pronun{
  color:#888;
  font-size:clamp(12px,2.5vw,14px);
  font-style:italic;
  margin-top:4px;
}

/* ========== CARD GRADIENT BORDERS ========== */
.grad-1{background:linear-gradient(90deg,#e91e63,#ff5722) padding-box,linear-gradient(90deg,#e91e63,#ff5722) border-box;}
.grad-2{background:linear-gradient(90deg,#9c27b0,#673ab7) padding-box,linear-gradient(90deg,#9c27b0,#673ab7) border-box;}
.grad-3{background:linear-gradient(90deg,#2196f3,#03a9f4) padding-box,linear-gradient(90deg,#2196f3,#03a9f4) border-box;}
.grad-4{background:linear-gradient(90deg,#00897b,#26a69a) padding-box,linear-gradient(90deg,#00897b,#26a69a) border-box;}
.grad-5{background:linear-gradient(90deg,#ff6f00,#ffa000) padding-box,linear-gradient(90deg,#ff6f00,#ffa000) border-box;}
.grad-6{background:linear-gradient(90deg,#6a1b9a,#ab47bc) padding-box,linear-gradient(90deg,#6a1b9a,#ab47bc) border-box;}
.grad-7{background:linear-gradient(90deg,#1565c0,#42a5f5) padding-box,linear-gradient(90deg,#1565c0,#42a5f5) border-box;}
.grad-8{background:linear-gradient(90deg,#2e7d32,#66bb6a) padding-box,linear-gradient(90deg,#2e7d32,#66bb6a) border-box;}
.grad-9{background:linear-gradient(90deg,#d84315,#ff7043) padding-box,linear-gradient(90deg,#d84315,#ff7043) border-box;}
.grad-10{background:linear-gradient(90deg,#4527a0,#7e57c2) padding-box,linear-gradient(90deg,#4527a0,#7e57c2) border-box;}

/* ========== FOOTER ========== */
.footer{
  text-align:center;
  padding:32px 20px;
  color:#999;
  font-size:13px;
  border-top:1px solid #e0e0e0;
  max-width:var(--max-w);
  margin:0 auto;
}
.footer a{color:var(--ru-blue);text-decoration:none}

/* ========== KEY PHRASE LEGEND ========== */
.legend{
  background:#fff;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:20px 24px;
  margin-bottom:28px;
}
.legend h3{font-size:16px;font-weight:700;margin-bottom:10px;color:#555}
.legend-items{display:flex;flex-wrap:wrap;gap:8px}
.legend-item{
  display:inline-flex;
  align-items:center;
  gap:4px;
  font-size:13px;
  padding:4px 10px;
  border-radius:6px;
}

/* ========== RESPONSIVE ========== */
@media(max-width:600px){
  .hero{padding:40px 16px 36px}
  .card-header{padding:16px 16px 12px;gap:10px}
  .card-body{padding:16px 16px 20px}
  .card-num{width:36px;height:36px;font-size:15px}
  .lang-bar{gap:5px;padding:10px 12px}
  .lang-btn{padding:6px 12px;font-size:12px}
  .ru-text{padding:14px 14px;font-size:16px}
  .translation{padding:12px 14px}
}
@media(min-width:601px) and (max-width:1024px){
  .container{padding:24px 24px 60px}
}
@media(min-width:1025px){
  .container{padding:32px 16px 80px}
}
/* safe area for notched iPhones */
@supports(padding:max(0px)){
  .hero{padding-top:max(60px,env(safe-area-inset-top))}
  .footer{padding-bottom:max(32px,env(safe-area-inset-bottom))}
}
</style>
</head>

const gradColors = [
  '#e91e63','#9c27b0','#2196f3','#00897b','#ff6f00',
  '#6a1b9a','#1565c0','#2e7d32','#d84315','#4527a0'
];

/* ==============================================================
   STATE
   ============================================================== */
let currentLang = 'all';

/* ==============================================================
   TEXT-TO-SPEECH — Web Speech API + Google TTS fallback
   ============================================================== */
let speakingId = null;
let currentAudio = null;

function speakRussian(text, btnEl) {
  // Stop any current speech
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }
  window.speechSynthesis && window.speechSynthesis.cancel();

  // Remove playing class from all buttons
  document.querySelectorAll('.speak-btn.playing').forEach(function(b) { b.classList.remove('playing'); });

  // If clicking the same button that's playing, just stop
  if (speakingId === btnEl.dataset.id) {
    speakingId = null;
    return;
  }
  speakingId = btnEl.dataset.id;
  btnEl.classList.add('playing');

  // Try Web Speech API first
  if ('speechSynthesis' in window) {
    var utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ru-RU';
    utter.rate = 0.85;
    utter.pitch = 1;

    // Try to find a Russian voice
    var voices = window.speechSynthesis.getVoices();
    var ruVoice = voices.find(function(v) { return v.lang && v.lang.startsWith('ru'); });
    if (ruVoice) utter.voice = ruVoice;

    utter.onend = function() {
      btnEl.classList.remove('playing');
      speakingId = null;
    };
    utter.onerror = function() {
      // Fallback to Google TTS
      playGoogleTTS(text, btnEl);
    };
    window.speechSynthesis.speak(utter);
  } else {
    // Fallback to Google TTS
    playGoogleTTS(text, btnEl);
  }
}

function playGoogleTTS(text, btnEl) {
  // Google Translate TTS — free, no API key needed, limited to ~200 chars
  var chunks = splitText(text, 180);
  playChunks(chunks, 0, btnEl);
}

function splitText(text, maxLen) {
  var parts = [];
  var sentences = text.split(/(?<=[.!?])\s+/);
  var current = '';
  for (var i = 0; i < sentences.length; i++) {
    if ((current + ' ' + sentences[i]).trim().length > maxLen && current.length > 0) {
      parts.push(current.trim());
      current = sentences[i];
    } else {
      current = (current + ' ' + sentences[i]).trim();
    }
  }
  if (current.length > 0) parts.push(current.trim());
  return parts;
}

function playChunks(chunks, index, btnEl) {
  if (index >= chunks.length || speakingId !== btnEl.dataset.id) {
    btnEl.classList.remove('playing');
    speakingId = null;
    currentAudio = null;
    return;
  }
  var encodedText = encodeURIComponent(chunks[index]);
  var url = 'https://translate.google.com/translate_tts?ie=UTF-8&tl=ru&client=tw-ob&q=' + encodedText;
  var audio = new Audio(url);
  currentAudio = audio;
  audio.playbackRate = 0.9;
  audio.onended = function() {
    playChunks(chunks, index + 1, btnEl);
  };
  audio.onerror = function() {
    btnEl.classList.remove('playing');
    speakingId = null;
    currentAudio = null;
  };
  audio.play().catch(function() {
    btnEl.classList.remove('playing');
    speakingId = null;
    currentAudio = null;
  });
}

// Preload voices
if ('speechSynthesis' in window) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = function() {
    window.speechSynthesis.getVoices();
  };
}

/* ==============================================================
   LANGUAGE SWITCHING
   ============================================================== */
function switchLang(lang) {
  currentLang = lang;
  // Update buttons
  document.querySelectorAll('.lang-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  // Show/hide translations
  document.querySelectorAll('.translation').forEach(function(el) {
    if (lang === 'all') {
      el.style.display = 'block';
    } else {
      el.style.display = el.classList.contains('trans-' + lang) ? 'block' : 'none';
    }
  });
}

/* ==============================================================
   RENDER CARDS
   ============================================================== */
function renderCards() {
  var container = document.getElementById('content');
  var html = '';

  // Legend
  html += '<div class="legend">';
  html += '<h3>🎨 Key Phrase Color Guide</h3>';
  html += '<div class="legend-items">';
  html += '<span class="legend-item kw1">Greetings / Key Phrases</span>';
  html += '<span class="legend-item kw2">Questions / Farewells</span>';
  html += '<span class="legend-item kw3">Actions / Verbs</span>';
  html += '<span class="legend-item kw4">Places / Nouns</span>';
  html += '<span class="legend-item kw5">Food / Objects</span>';
  html += '<span class="legend-item kw6">Time / Extra</span>';
  html += '</div></div>';

  for (var i = 0; i < scenarios.length; i++) {
    var s = scenarios[i];
    var color = gradColors[i];

    html += '<article class="scenario-card">';

    // Header
    html += '<div class="card-header">';
    html += '<div class="card-num" style="background:' + color + '">' + s.id + '</div>';
    html += '<div><h2>' + s.icon + ' ' + s.scene + '</h2>';
    html += '<div style="font-size:13px;color:#888;margin-top:2px">' + s.sceneHk + ' · ' + s.sceneTw + ' · ' + s.sceneCn + '</div>';
    html += '</div></div>';

    // Body
    html += '<div class="card-body">';

    // Russian text
    html += '<div class="ru-text" style="border-left-color:' + color + '">' + s.ru + '</div>';

    // Pronunciation
    html += '<div class="pronun">📖 ' + s.pronun + '</div>';

    // Speak button
    html += '<button class="speak-btn" data-id="' + s.id + '" onclick="speakRussian(\'' + escapeForAttr(s.ruPlain) + '\', this)">';
    html += '<span class="speak-icon">🔊</span> Listen / Послушать</button>';

    // Keywords
    html += '<div style="margin:12px 0 14px;display:flex;flex-wrap:wrap;gap:6px">';
    for (var k = 0; k < s.keywords.length; k++) {
      var kwClass = 'kw' + ((k % 6) + 1);
      html += '<span class="kw ' + kwClass + '" style="font-size:12px;padding:3px 8px;border-radius:6px">' + s.keywords[k] + '</span>';
    }
    html += '</div>';

    // Translations
    html += '<div class="translation trans-en"><div class="trans-label">🇬🇧 English</div><div>' + s.en + '</div></div>';
    html += '<div class="translation trans-hk" style="margin-top:8px"><div class="trans-label">🇭🇰 繁體中文（香港）</div><div>' + s.hk + '</div></div>';
    html += '<div class="translation trans-tw" style="margin-top:8px"><div class="trans-label">🇹🇼 繁體中文（台灣）</div><div>' + s.tw + '</div></div>';
    html += '<div class="translation trans-cn" style="margin-top:8px"><div class="trans-label">🇨🇳 简体中文（中国）</div><div>' + s.cn + '</div></div>';

    html += '</div></article>';
  }

  container.innerHTML = html;
}

function escapeForAttr(str) {
  return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

/* ==============================================================
   INIT
   ============================================================== */
renderCards();
