<head>
<meta charset="UTF-8">

<title>Spain | Aprende Español</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇪🇸</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ========== RESET & VARIABLES ========== */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fffbf0;
  --card-bg:#ffffff;
  --es-red:#c60b1e;
  --es-yellow:#ffc400;
  --es-warm:#e65100;
  --key1:#c62828;
  --key2:#ad1457;
  --key3:#1565c0;
  --key4:#00695c;
  --key5:#e65100;
  --key6:#6a1b9a;
  --shadow:0 4px 24px rgba(0,0,0,0.08);
  --shadow-hover:0 8px 32px rgba(0,0,0,0.14);
  --radius:16px;
  --max-w:900px;
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:'Noto Sans','Noto Sans TC','Noto Sans SC',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:#333;
  line-height:1.7;
  min-height:100vh;
  overflow-x:hidden;
}

/* ========== HERO ========== */
.hero{
  background:linear-gradient(135deg,#c60b1e 0%,#ffc400 50%,#c60b1e 100%);
  padding:60px 20px 50px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(circle at 20% 50%,rgba(255,255,255,0.18) 0%,transparent 50%),
    radial-gradient(circle at 80% 30%,rgba(255,255,255,0.12) 0%,transparent 40%);
}
.hero h1{
  font-size:clamp(28px,6vw,48px);
  font-weight:900;
  color:#fff;
  text-shadow:0 2px 12px rgba(0,0,0,0.3);
  position:relative;
  letter-spacing:1px;
}
.hero .subtitle{
  font-size:clamp(13px,3vw,18px);
  color:rgba(255,255,255,0.95);
  margin-top:8px;
  position:relative;
  font-weight:400;
}
.hero .flag-row{
  margin-top:18px;
  font-size:clamp(28px,5vw,42px);
  position:relative;
}

/* ========== LANGUAGE SWITCHER ========== */
.lang-bar{
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
  padding:16px 20px;
  background:#fff;
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,0.06);
}
.lang-btn{
  padding:8px 18px;
  border:2px solid #ddd;
  border-radius:24px;
  background:#fff;
  cursor:pointer;
  font-size:14px;
  font-weight:600;
  transition:all .25s ease;
  white-space:nowrap;
  font-family:inherit;
}
.lang-btn:hover{border-color:var(--es-red);color:var(--es-red)}
.lang-btn.active{
  background:var(--es-red);
  color:#fff;
  border-color:var(--es-red);
}

/* ========== MAIN CONTAINER ========== */
.container{
  max-width:var(--max-w);
  margin:0 auto;
  padding:24px 16px 60px;
}

/* ========== SCENARIO CARDS ========== */
.scenario-card{
  background:var(--card-bg);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  margin-bottom:28px;
  overflow:hidden;
  transition:box-shadow .3s ease,transform .2s ease;
}
.scenario-card:hover{
  box-shadow:var(--shadow-hover);
  transform:translateY(-2px);
}
.card-header{
  padding:20px 24px 16px;
  display:flex;
  align-items:center;
  gap:14px;
  border-bottom:1px solid rgba(0,0,0,0.06);
}
.card-num{
  width:44px;height:44px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:18px;
  flex-shrink:0;
}
.card-header h2{
  font-size:clamp(16px,3.5vw,20px);
  font-weight:700;
  color:#333;
}
.card-header .scene-icon{font-size:24px;flex-shrink:0}

.card-body{padding:20px 24px 24px}

/* ========== SPANISH TEXT ========== */
.es-text{
  font-size:clamp(17px,3.5vw,22px);
  line-height:1.8;
  color:#1a1a1a;
  margin-bottom:16px;
  padding:18px 20px;
  background:linear-gradient(135deg,#fff8e1 0%,#ffebee 100%);
  border-radius:12px;
  border-left:5px solid var(--es-red);
  position:relative;
}
.es-text .kw{
  font-weight:700;
  padding:1px 5px;
  border-radius:4px;
  white-space:nowrap;
}
.kw1{background:rgba(198,40,40,0.15);color:#b71c1c}
.kw2{background:rgba(173,20,87,0.15);color:#880e4f}
.kw3{background:rgba(21,101,192,0.15);color:#0d47a1}
.kw4{background:rgba(0,105,92,0.15);color:#004d40}
.kw5{background:rgba(230,81,0,0.15);color:#bf360c}
.kw6{background:rgba(106,27,154,0.15);color:#4a148c}

/* ========== SPEAK BUTTON ========== */
.speak-btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:8px 16px;
  background:linear-gradient(135deg,var(--es-red),#d32f2f);
  color:#fff;
  border:none;
  border-radius:24px;
  cursor:pointer;
  font-size:14px;
  font-weight:600;
  transition:all .25s ease;
  margin-bottom:16px;
  font-family:inherit;
}
.speak-btn:hover{
  background:linear-gradient(135deg,#b71c1c,#c62828);
  transform:scale(1.05);
}
.speak-btn:active{transform:scale(0.97)}
.speak-btn.playing{
  animation:pulse-glow 1.2s infinite;
}
@keyframes pulse-glow{
  0%,100%{box-shadow:0 0 0 0 rgba(198,40,40,0.4)}
  50%{box-shadow:0 0 0 10px rgba(198,40,40,0)}
}
.speak-icon{font-size:18px}

/* ========== TRANSLATION BLOCK ========== */
.translation{
  margin-top:12px;
  padding:14px 18px;
  border-radius:10px;
  font-size:clamp(14px,3vw,16px);
  line-height:1.7;
}
.trans-en{background:#e8f5e9;border-left:4px solid #43a047;color:#2e7d32}
.trans-hk{background:#fff3e0;border-left:4px solid #fb8c00;color:#e65100}
.trans-tw{background:#fce4ec;border-left:4px solid #ec407a;color:#c2185b}
.trans-cn{background:#e3f2fd;border-left:4px solid #42a5f5;color:#1565c0}
.trans-label{
  display:inline-block;
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:1px;
  padding:2px 8px;
  border-radius:4px;
  margin-bottom:6px;
}
.trans-en .trans-label{background:#43a047;color:#fff}
.trans-hk .trans-label{background:#fb8c00;color:#fff}
.trans-tw .trans-label{background:#ec407a;color:#fff}
.trans-cn .trans-label{background:#42a5f5;color:#fff}

/* ========== PRONUNCIATION GUIDE ========== */
.pronun{
  color:#888;
  font-size:clamp(12px,2.5vw,14px);
  font-style:italic;
  margin-top:4px;
}

/* ========== CARD GRADIENT BORDERS ========== */
.grad-1{background:linear-gradient(90deg,#c62828,#ff5722) padding-box,linear-gradient(90deg,#c62828,#ff5722) border-box;}
.grad-2{background:linear-gradient(90deg,#ad1457,#e91e63) padding-box,linear-gradient(90deg,#ad1457,#e91e63) border-box;}
.grad-3{background:linear-gradient(90deg,#1565c0,#42a5f5) padding-box,linear-gradient(90deg,#1565c0,#42a5f5) border-box;}
.grad-4{background:linear-gradient(90deg,#00695c,#26a69a) padding-box,linear-gradient(90deg,#00695c,#26a69a) border-box;}
.grad-5{background:linear-gradient(90deg,#e65100,#ff9800) padding-box,linear-gradient(90deg,#e65100,#ff9800) border-box;}
.grad-6{background:linear-gradient(90deg,#6a1b9a,#ab47bc) padding-box,linear-gradient(90deg,#6a1b9a,#ab47bc) border-box;}
.grad-7{background:linear-gradient(90deg,#2e7d32,#66bb6a) padding-box,linear-gradient(90deg,#2e7d32,#66bb6a) border-box;}
.grad-8{background:linear-gradient(90deg,#0277bd,#29b6f6) padding-box,linear-gradient(90deg,#0277bd,#29b6f6) border-box;}
.grad-9{background:linear-gradient(90deg,#d84315,#ff7043) padding-box,linear-gradient(90deg,#d84315,#ff7043) border-box;}
.grad-10{background:linear-gradient(90deg,#4527a0,#7e57c2) padding-box,linear-gradient(90deg,#4527a0,#7e57c2) border-box;}

/* ========== FOOTER ========== */
.footer{
  text-align:center;
  padding:32px 20px;
  color:#999;
  font-size:13px;
  border-top:1px solid #e0e0e0;
  max-width:var(--max-w);
  margin:0 auto;
}
.footer a{color:var(--es-red);text-decoration:none}

/* ========== KEY PHRASE LEGEND ========== */
.legend{
  background:#fff;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:20px 24px;
  margin-bottom:28px;
}
.legend h3{font-size:16px;font-weight:700;margin-bottom:10px;color:#555}
.legend-items{display:flex;flex-wrap:wrap;gap:8px}
.legend-item{
  display:inline-flex;
  align-items:center;
  gap:4px;
  font-size:13px;
  padding:4px 10px;
  border-radius:6px;
}

/* ========== WALKING CHARACTER ========== */
#walker{
  position:fixed;
  z-index:999;
  pointer-events:none;
  width:64px;
  height:64px;
  transition:none;
  image-rendering:auto;
}
#walker svg{width:100%;height:100%}

/* ========== RESPONSIVE ========== */
@media(max-width:600px){
  .hero{padding:40px 16px 36px}
  .card-header{padding:16px 16px 12px;gap:10px}
  .card-body{padding:16px 16px 20px}
  .card-num{width:36px;height:36px;font-size:15px}
  .lang-bar{gap:5px;padding:10px 12px}
  .lang-btn{padding:6px 12px;font-size:12px}
  .es-text{padding:14px 14px;font-size:16px}
  .translation{padding:12px 14px}
  #walker{width:48px;height:48px}
}
@media(min-width:601px) and (max-width:1024px){
  .container{padding:24px 24px 60px}
}
@media(min-width:1025px){
  .container{padding:32px 16px 80px}
}
/* safe area for notched iPhones */
@supports(padding:max(0px)){
  .hero{padding-top:max(60px,env(safe-area-inset-top))}
  .footer{padding-bottom:max(32px,env(safe-area-inset-bottom))}
}
</style>
</head>

var gradColors = [
  '#c62828','#ad1457','#1565c0','#00695c','#e65100',
  '#6a1b9a','#2e7d32','#0277bd','#d84315','#4527a0'

/* ==============================================================
   STATE
   ============================================================== */
var currentLang = 'all';

/* ==============================================================
   TEXT-TO-SPEECH — Web Speech API + Google TTS fallback
   ============================================================== */
var speakingId = null;
var currentAudio = null;
var GOOGLE_TTS_MAX_CHARS = 180;
var GOOGLE_TTS_PLAYBACK_RATE = 0.9;

function speakSpanish(text, btnEl) {
  // Stop any current speech
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }
  window.speechSynthesis && window.speechSynthesis.cancel();

  // Remove playing class from all buttons
  document.querySelectorAll('.speak-btn.playing').forEach(function(b) { b.classList.remove('playing'); });

  // If clicking the same button that's playing, just stop
  if (speakingId === btnEl.dataset.id) {
    speakingId = null;
    return;
  }
  speakingId = btnEl.dataset.id;
  btnEl.classList.add('playing');

  // Try Web Speech API first
  if ('speechSynthesis' in window) {
    var utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'es-ES';
    utter.rate = 0.85;
    utter.pitch = 1;

    // Try to find a Spanish voice
    var voices = window.speechSynthesis.getVoices();
    var esVoice = voices.find(function(v) { return v.lang && v.lang.startsWith('es'); });
    if (esVoice) utter.voice = esVoice;

    utter.onend = function() {
      btnEl.classList.remove('playing');
      speakingId = null;
    };
    utter.onerror = function() {
      // Fallback to Google TTS
      playGoogleTTS(text, btnEl);
    };
    window.speechSynthesis.speak(utter);
  } else {
    // Fallback to Google TTS
    playGoogleTTS(text, btnEl);
  }
}

function playGoogleTTS(text, btnEl) {
  // Google Translate TTS — free, no API key, unofficial endpoint (may change)
  var chunks = splitText(text, GOOGLE_TTS_MAX_CHARS);
  playChunks(chunks, 0, btnEl);
}

function splitText(text, maxLen) {
  var parts = [];
  // Split text into sentences based on terminal punctuation (. ! ?), keeping the delimiters.
  // This avoids treating Spanish inverted punctuation (¡ ¿) as sentence terminators
  // and correctly handles punctuation at end-of-string without trailing whitespace.
  var sentences = text.match(/[^.!?]+[.!?]?/g) || [text];
  var current = '';
  for (var i = 0; i < sentences.length; i++) {
    if ((current + ' ' + sentences[i]).trim().length > maxLen && current.length > 0) {
      parts.push(current.trim());
      current = sentences[i];
    } else {
      current = (current + ' ' + sentences[i]).trim();
    }
  }
  if (current.length > 0) parts.push(current.trim());
  return parts;
}

function playChunks(chunks, index, btnEl) {
  if (index >= chunks.length || speakingId !== btnEl.dataset.id) {
    btnEl.classList.remove('playing');
    speakingId = null;
    currentAudio = null;
    return;
  }
  var encodedText = encodeURIComponent(chunks[index]);
  var url = 'https://translate.google.com/translate_tts?ie=UTF-8&tl=es&client=tw-ob&q=' + encodedText;
  var audio = new Audio(url);
  currentAudio = audio;
  audio.playbackRate = GOOGLE_TTS_PLAYBACK_RATE;
  audio.onended = function() {
    playChunks(chunks, index + 1, btnEl);
  };
  audio.onerror = function() {
    btnEl.classList.remove('playing');
    speakingId = null;
    currentAudio = null;
  };
  audio.play().catch(function() {
    btnEl.classList.remove('playing');
    speakingId = null;
    currentAudio = null;
  });
}

// Preload voices
if ('speechSynthesis' in window) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = function() {
    window.speechSynthesis.getVoices();
  };
}

/* ==============================================================
   LANGUAGE SWITCHING
   ============================================================== */
function switchLang(lang) {
  currentLang = lang;
  // Update buttons
  document.querySelectorAll('.lang-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  // Show/hide translations
  document.querySelectorAll('.translation').forEach(function(el) {
    if (lang === 'all') {
      el.style.display = 'block';
    } else {
      el.style.display = el.classList.contains('trans-' + lang) ? 'block' : 'none';
    }
  });
}

/* ==============================================================
   RENDER CARDS
   ============================================================== */
function renderCards() {
  var container = document.getElementById('content');
  var html = '';

  // Legend
  html += '<div class="legend">';
  html += '<h3>🎨 Key Phrase Color Guide</h3>';
  html += '<div class="legend-items">';
  html += '<span class="legend-item kw1">Greetings / Key Phrases</span>';
  html += '<span class="legend-item kw2">Questions / Farewells</span>';
  html += '<span class="legend-item kw3">Actions / Verbs</span>';
  html += '<span class="legend-item kw4">Places / Nouns</span>';
  html += '<span class="legend-item kw5">Food / Objects</span>';
  html += '<span class="legend-item kw6">Time / Extra</span>';
  html += '</div></div>';

  for (var i = 0; i < scenarios.length; i++) {
    var s = scenarios[i];
    var color = gradColors[i];

    html += '<article class="scenario-card">';

    // Header
    html += '<div class="card-header">';
    html += '<div class="card-num" style="background:' + color + '">' + s.id + '</div>';
    html += '<div><h2>' + s.icon + ' ' + s.scene + '</h2>';
    html += '<div style="font-size:13px;color:#888;margin-top:2px">' + s.sceneHk + ' · ' + s.sceneTw + ' · ' + s.sceneCn + '</div>';
    html += '</div></div>';

    // Body
    html += '<div class="card-body">';

    // Spanish text
    html += '<div class="es-text" style="border-left-color:' + color + '">' + s.es + '</div>';

    // Pronunciation
    html += '<div class="pronun">📖 ' + s.pronun + '</div>';

    // Speak button
    html += '<button class="speak-btn" data-id="' + s.id + '" onclick="speakSpanish(\'' + escapeForAttr(s.esPlain) + '\', this)">';
    html += '<span class="speak-icon">🔊</span> Listen / Escuchar</button>';

    // Keywords
    html += '<div style="margin:12px 0 14px;display:flex;flex-wrap:wrap;gap:6px">';
    for (var k = 0; k < s.keywords.length; k++) {
      var kwClass = 'kw' + ((k % 6) + 1);
      html += '<span class="kw ' + kwClass + '" style="font-size:12px;padding:3px 8px;border-radius:6px">' + s.keywords[k] + '</span>';
    }
    html += '</div>';

    // Translations
    html += '<div class="translation trans-en"><div class="trans-label">🇬🇧 English</div><div>' + s.en + '</div></div>';
    html += '<div class="translation trans-hk" style="margin-top:8px"><div class="trans-label">🇭🇰 繁體中文（香港）</div><div>' + s.hk + '</div></div>';
    html += '<div class="translation trans-tw" style="margin-top:8px"><div class="trans-label">🇹🇼 繁體中文（台灣）</div><div>' + s.tw + '</div></div>';
    html += '<div class="translation trans-cn" style="margin-top:8px"><div class="trans-label">🇨🇳 简体中文（中国）</div><div>' + s.cn + '</div></div>';

    html += '</div></article>';
  }

  container.innerHTML = html;
}

function escapeForAttr(str) {
  return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

/* ==============================================================
   WALKING SPANISH CHARACTER — birdview anime style
   ============================================================== */
(function() {
  var walker = document.getElementById('walker');
  var size = 64;
  var x = Math.random() * (window.innerWidth - size);
  var y = Math.random() * (window.innerHeight - size);
  var angle = Math.random() * Math.PI * 2;
  var speed = 1.2;
  var facingRight = true;
  var frame = 0;
  var frameCount = 0;

  // Draw the Spanish-style character as inline SVG
  function drawCharacter(stepping) {
    var legOffset = stepping ? 3 : -3;
    var armOffset = stepping ? -4 : 4;
    // Spanish-style character: sombrero/hat, red sash, flamenco-inspired
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64"'
      + ' style="transform:scaleX(' + (facingRight ? 1 : -1) + ')">'
      // Shadow
      + '<ellipse cx="32" cy="60" rx="14" ry="4" fill="rgba(0,0,0,0.13)"/>'
      // Left leg
      + '<rect x="25" y="46" width="5" height="12" rx="2" fill="#2c2c2c" transform="translate(' + (-legOffset) + ',0)"/>'
      // Right leg
      + '<rect x="34" y="46" width="5" height="12" rx="2" fill="#2c2c2c" transform="translate(' + legOffset + ',0)"/>'
      // Shoes
      + '<ellipse cx="27.5" cy="58" rx="3.5" ry="2" fill="#1a1a1a" transform="translate(' + (-legOffset) + ',0)"/>'
      + '<ellipse cx="36.5" cy="58" rx="3.5" ry="2" fill="#1a1a1a" transform="translate(' + legOffset + ',0)"/>'
      // Body (white shirt)
      + '<rect x="23" y="30" width="18" height="18" rx="4" fill="#FFFFFF" stroke="#ddd" stroke-width="0.5"/>'
      // Red sash / faja
      + '<rect x="23" y="40" width="18" height="4" rx="1" fill="#c60b1e"/>'
      // Left arm
      + '<rect x="17" y="32" width="5" height="13" rx="2.5" fill="#FFFFFF" stroke="#ddd" stroke-width="0.5" transform="rotate(' + armOffset + ',19.5,32)"/>'
      // Right arm
      + '<rect x="42" y="32" width="5" height="13" rx="2.5" fill="#FFFFFF" stroke="#ddd" stroke-width="0.5" transform="rotate(' + (-armOffset) + ',44.5,32)"/>'
      // Hand (left)
      + '<circle cx="19.5" cy="46" r="2.5" fill="#f5c6a0" transform="rotate(' + armOffset + ',19.5,32)"/>'
      // Hand (right)
      + '<circle cx="44.5" cy="46" r="2.5" fill="#f5c6a0" transform="rotate(' + (-armOffset) + ',44.5,32)"/>'
      // Neck
      + '<rect x="29" y="26" width="6" height="6" rx="2" fill="#f5c6a0"/>'
      // Head
      + '<circle cx="32" cy="22" r="10" fill="#f5c6a0"/>'
      // Eyes
      + '<circle cx="28.5" cy="21" r="1.5" fill="#333"/>'
      + '<circle cx="35.5" cy="21" r="1.5" fill="#333"/>'
      // Smile
      + '<path d="M29,25 Q32,28 35,25" stroke="#c62828" stroke-width="1.2" fill="none" stroke-linecap="round"/>'
      // Sombrero cordobés (Spanish hat)
      + '<ellipse cx="32" cy="14" rx="15" ry="4" fill="#1a1a1a"/>'
      + '<rect x="25" y="6" width="14" height="9" rx="3" fill="#1a1a1a"/>'
      + '<rect x="26" y="8" width="12" height="2" rx="1" fill="#c60b1e"/>'
      // Small Spanish flag on hat
      + '<rect x="39" y="4" width="1" height="8" fill="#666"/>'
      + '<rect x="40" y="4" width="6" height="2.5" fill="#c60b1e"/>'
      + '<rect x="40" y="6.5" width="6" height="2" fill="#ffc400"/>'
      + '<rect x="40" y="8.5" width="6" height="2.5" fill="#c60b1e"/>'
      + '</svg>';
    return svg;
  }

  // Collision padding around content elements
  var pad = 8;

  // Check if walker rect overlaps any content element
  function hitsContent(wx, wy) {
    var walkerRect = {left: wx, top: wy, right: wx + size, bottom: wy + size};
    var elems = document.querySelectorAll('.hero, .lang-bar, .container, .footer, .card, .legend');
    for (var i = 0; i < elems.length; i++) {
      var r = elems[i].getBoundingClientRect();
      // Skip elements not visible in viewport
      if (r.width === 0 && r.height === 0) continue;
      var pr = {left: r.left - pad, top: r.top - pad, right: r.right + pad, bottom: r.bottom + pad};
      if (walkerRect.left < pr.right && walkerRect.right > pr.left &&
          walkerRect.top < pr.bottom && walkerRect.bottom > pr.top) {
        return r;
      }
    }
    return null;
  }

  // Place walker in a valid starting position (bottom-right corner, safe area)
  x = window.innerWidth - size - 20;
  y = window.innerHeight - size - 20;

  function updatePosition() {
    // Random direction changes
    if (Math.random() < 0.02) {
      angle += (Math.random() - 0.5) * Math.PI * 0.5;
    }

    var nx = x + Math.cos(angle) * speed;
    var ny = y + Math.sin(angle) * speed;

    // Bounce off viewport edges
    var maxX = window.innerWidth - size;
    var maxY = window.innerHeight - size;

    if (nx < 0 || nx > maxX) {
      angle = Math.PI - angle;
      nx = Math.max(0, Math.min(maxX, nx));
    }
    if (ny < 10) {
      angle = -angle;
      ny = 10;
    }
    if (ny > maxY - 10) {
      angle = -angle;
      ny = maxY - 10;
    }

    // Bounce off content elements to avoid overlapping text
    var hit = hitsContent(nx, ny);
    if (hit) {
      // Determine which side the walker is approaching from and reflect
      var cx = nx + size / 2;
      var cy = ny + size / 2;
      var elemCX = (hit.left + hit.right) / 2;
      var elemCY = (hit.top + hit.bottom) / 2;
      var dx = cx - elemCX;
      var dy = cy - elemCY;

      // Reflect based on the dominant axis of approach
      if (Math.abs(dx) / (hit.width / 2 + size / 2) > Math.abs(dy) / (hit.height / 2 + size / 2)) {
        angle = Math.PI - angle;
      } else {
        angle = -angle;
      }
      // Add small random perturbation to avoid getting stuck
      angle += (Math.random() - 0.5) * 0.3;
      // Stay at previous safe position
      nx = x;
      ny = y;
    }

    x = nx;
    y = ny;

    facingRight = Math.cos(angle) >= 0;

    // Animate walking frames
    frameCount++;
    if (frameCount % 10 === 0) frame = 1 - frame;

    walker.innerHTML = drawCharacter(frame === 1);
    walker.style.left = x + 'px';
    walker.style.top = y + 'px';

    requestAnimationFrame(updatePosition);
  }

  // Start animation
  walker.style.position = 'fixed';
  walker.style.left = x + 'px';
  walker.style.top = y + 'px';
  requestAnimationFrame(updatePosition);
})();
